<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>蝎子 vs 毛毛虫 v5</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#1a1a2e;
  display:flex; flex-direction:column; align-items:center;
  width:100vw; height:100svh; overflow:hidden;
  font-family:Arial,sans-serif;
}

/* 顶部信息栏 */
#topbar {
  width:100%; max-width:420px;
  display:flex; justify-content:space-between; align-items:center;
  padding:4px 10px;
  background:rgba(255,220,0,0.1);
  color:#FFE600; font-size:12px;
  flex-shrink:0;
}
#topbar button {
  background:rgba(255,80,50,0.7); border:none; border-radius:12px;
  color:white; font-size:11px; padding:3px 10px;
}

/* 计分板 */
#scoreboard {
  width:100%; max-width:420px;
  display:flex; justify-content:space-around; align-items:center;
  padding:4px 8px;
  background:rgba(255,255,255,0.07);
  color:white; font-size:12px;
  flex-shrink:0;
}
.score-val { font-size:18px; font-weight:bold; text-align:center; }
.score-val.player { color:#FFE600; }
.score-val.ai { color:#b44fff; }

/* canvas */
#canvas {
  width:100%; max-width:420px;
  display:block;
  flex-shrink:1;
  min-height:0;
}

/* 提示 */
#hint {
  color:#ffcc80; font-size:10px; padding:2px 0;
  flex-shrink:0;
}

/* D-pad */
#dpad {
  display:grid;
  grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(3, 52px);
  gap:3px; margin-top:4px;
  flex-shrink:0;
  touch-action:none;
}
.dbtn {
  background:rgba(255,255,255,0.13);
  border:none; border-radius:10px;
  color:white; font-size:20px;
  display:flex; align-items:center; justify-content:center;
  user-select:none;
}
.dbtn:active { background:rgba(255,255,255,0.3); }
.dempty { visibility:hidden; }

/* 攻击按钮 */
#atk {
  margin-top:5px; margin-bottom:4px;
  padding:10px 36px;
  background:linear-gradient(135deg,#ff6b35,#ff8c00);
  border:none; border-radius:50px;
  color:white; font-size:16px; font-weight:bold;
  flex-shrink:0;
  touch-action:manipulation;
}

/* 全屏遮罩 - 用JS控制display */
.modal {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.8);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  color:white; z-index:9999;
}
.modal h2 { font-size:26px; margin-bottom:10px; }
.modal p  { font-size:14px; opacity:0.85; margin-bottom:20px; text-align:center; padding:0 24px; line-height:1.6; }
.modal-btn {
  padding:16px 44px;
  background:linear-gradient(135deg,#ff6b35,#b44fff);
  border:none; border-radius:50px;
  color:white; font-size:20px; font-weight:bold;
  touch-action:manipulation;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="topbar">
  <span id="lvl">关卡 1</span>
  <button id="restart-btn">🔄 重新开始</button>
</div>

<div id="scoreboard">
  <div>
    <div style="font-size:10px;opacity:0.7">🦂 蝎子（你）</div>
    <div class="score-val player" id="ps">0</div>
  </div>
  <div style="font-size:22px" id="status">⚔️</div>
  <div>
    <div style="font-size:10px;opacity:0.7">🐛 毛毛虫（AI）</div>
    <div class="score-val ai" id="as">0</div>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="hint">🎮 方向键移动 &nbsp;|&nbsp; ⚡ 攻击灌木/对手</div>

<div id="dpad">
  <div class="dempty"></div>
  <div class="dbtn" id="bu">▲</div>
  <div class="dempty"></div>
  <div class="dbtn" id="bl">◀</div>
  <div class="dempty"></div>
  <div class="dbtn" id="br">▶</div>
  <div class="dempty"></div>
  <div class="dbtn" id="bd">▼</div>
  <div class="dempty"></div>
</div>

<button id="atk">⚡ 攻击</button>

<!-- 开始界面 -->
<div class="modal" id="m-start">
  <h2>🦂 蝎子 vs 毛毛虫 🐛</h2>
  <p>吃蘑菇+1，毒蘑菇-2<br>蓝莓+2，打灌木/树获得更多蓝莓<br>吃掉对方获得其所有分数！</p>
  <button class="modal-btn" id="start-btn">开始游戏</button>
</div>

<!-- 广告界面 -->
<div class="modal" id="m-ad" style="display:none">
  <h2>🎬 观看广告复活！</h2>
  <div style="width:260px;height:140px;background:#333;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:14px;">📺</div>
  <div id="ad-txt">请等待 <span id="ad-sec">10</span> 秒</div>
  <button class="modal-btn" id="ad-btn" style="margin-top:14px;opacity:0.4;pointer-events:none;">🔄 复活 + 抽奖</button>
</div>

<!-- 抽奖 -->
<div class="modal" id="m-prize" style="display:none">
  <h2>🎰 抽奖！</h2>
  <div id="prize-ico" style="font-size:56px;margin:14px 0;">🦕</div>
  <div id="prize-txt" style="font-size:16px;margin-bottom:20px;text-align:center;"></div>
  <button class="modal-btn" id="prize-btn">太棒了！</button>
</div>

<script>
// ── canvas 自适应 ──
const cv = document.getElementById('canvas');
const ctx = cv.getContext('2d');
function resizeCanvas() {
  const remaining = window.innerHeight
    - document.getElementById('topbar').offsetHeight
    - document.getElementById('scoreboard').offsetHeight
    - document.getElementById('hint').offsetHeight
    - document.getElementById('dpad').offsetHeight
    - document.getElementById('atk').offsetHeight
    - 30; // 边距
  const w = Math.min(window.innerWidth, 420);
  cv.width  = Math.floor(w / 30) * 30;
  cv.height = Math.max(180, Math.min(320, Math.floor(remaining / 30) * 30));
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const TILE = 30;
function COLS(){ return Math.floor(cv.width/TILE); }
function ROWS(){ return Math.floor(cv.height/TILE); }

// ── 关卡 ──
let level = 1, levelWins = 0;
function aiInterval(lv){ return Math.max(18, 45-(lv-1)*3); }

// ── 角色 ──
let playerUnlocked = false;
const ROLES = {
  scorpion:    {emoji:'🦂', color:'#FFE600'},
  caterpillar: {emoji:'🐛', color:'#b44fff'},
  dinosaur:    {emoji:'🦕', color:'#FFE600'},
};

let P, AI, items, running=false, frame=0;

function mkP(){
  return {x:3,y:3,seg:[{x:3,y:3},{x:2,y:3}],score:0,role:'scorpion',atkCD:0,inv:0};
}
function mkAI(){
  return {x:COLS()-4,y:ROWS()-4,seg:[{x:COLS()-4,y:ROWS()-4},{x:COLS()-3,y:ROWS()-4}],score:0,role:'caterpillar',timer:0,interval:aiInterval(level)};
}

const ITEMS = {
  mushroom: {e:'🍄',s:1},  poison:{e:'☠️',s:-2},
  blueberry:{e:'🫐',s:2},  bush:{e:'🌿',s:0,hp:5,rwd:5},
  tree:     {e:'🌳',s:0,hp:10,rwd:10},
};

function spawnItems(){
  items=[];
  [{t:'mushroom',n:5},{t:'poison',n:3},{t:'blueberry',n:6},{t:'bush',n:3},{t:'tree',n:2}].forEach(({t,n})=>{
    for(let i=0;i<n;i++){
      let d=ITEMS[t]; items.push({t,x:rnd(COLS()),y:rnd(ROWS()),hp:d.hp||0,maxhp:d.hp||0});
    }
  });
}

function rnd(n){return Math.floor(Math.random()*n);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function safePos(){
  for(let i=0;i<80;i++){
    let x=rnd(COLS()),y=rnd(ROWS());
    if(Math.abs(x-P.x)+Math.abs(y-P.y)>=4 && Math.abs(x-AI.x)+Math.abs(y-AI.y)>=4) return {x,y};
  }
  return {x:rnd(COLS()),y:rnd(ROWS())};
}

// ── 开始/重置 ──
function startGame(){
  hide('m-start');
  P=mkP(); AI=mkAI();
  P.role=playerUnlocked?'dinosaur':'scorpion';
  spawnItems(); running=true;
  updScore(); updLevel();
  requestAnimationFrame(loop);
}

function restartGame(){
  level=1; levelWins=0;
  P=mkP(); AI=mkAI();
  P.role=playerUnlocked?'dinosaur':'scorpion';
  spawnItems(); running=true;
  updScore(); updLevel();
}

// ── 按钮绑定（统一用 touchstart + click 双绑定）──
function bindBtn(id, fn){
  const el=document.getElementById(id);
  el.addEventListener('touchstart', e=>{ e.preventDefault(); fn(); }, {passive:false});
  el.addEventListener('click', fn);
}

bindBtn('start-btn',  startGame);
bindBtn('restart-btn',restartGame);
bindBtn('prize-btn',  closePrize);

// dpad 长按
let holdTimer=null, holdDir=null;
function startHold(dx,dy){
  moveP(dx,dy);
  holdDir={dx,dy};
  holdTimer=setInterval(()=>holdDir&&moveP(holdDir.dx,holdDir.dy),180);
}
function stopHold(){ holdDir=null; if(holdTimer){clearInterval(holdTimer);holdTimer=null;} }

['bu','bd','bl','br'].forEach((id,i)=>{
  const [dx,dy]=[[0,-1],[0,1],[-1,0],[1,0]][i];
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();startHold(dx,dy);},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();stopHold();},{passive:false});
  el.addEventListener('touchcancel',e=>{e.preventDefault();stopHold();},{passive:false});
  el.addEventListener('click',()=>moveP(dx,dy));
});

document.getElementById('atk').addEventListener('touchstart',e=>{e.preventDefault();doAtk();},{passive:false});
document.getElementById('atk').addEventListener('click',doAtk);

document.addEventListener('keydown',e=>{
  if(!running)return;
  ({ArrowUp:()=>moveP(0,-1),ArrowDown:()=>moveP(0,1),ArrowLeft:()=>moveP(-1,0),ArrowRight:()=>moveP(1,0),' ':doAtk}[e.key]||()=>{})();
});

// ── 移动 ──
function moveP(dx,dy){
  if(!running)return;
  let nx=clamp(P.x+dx,0,COLS()-1), ny=clamp(P.y+dy,0,ROWS()-1);
  P.seg.unshift({x:nx,y:ny}); P.seg.pop(); P.x=nx; P.y=ny;
  pickP(); pvp();
}

// ── 攻击 ──
function doAtk(){
  if(!running||P.atkCD>0)return;
  P.atkCD=20;
  for(let item of items){
    if(item.t==='bush'||item.t==='tree'){
      if(Math.abs(item.x-P.x)+Math.abs(item.y-P.y)<=1){
        item.hp--;
        if(item.hp<=0){
          let rwd=ITEMS[item.t].rwd;
          P.score+=rwd*2; float('+'+rwd*2,P.x,P.y,'#3498db');
          items.splice(items.indexOf(item),1);
          let t=item.t; setTimeout(()=>{let p=safePos();items.push({t,x:p.x,y:p.y,hp:ITEMS[t].hp,maxhp:ITEMS[t].hp});},5000);
        }
        updScore(); return;
      }
    }
  }
  if(Math.abs(AI.x-P.x)+Math.abs(AI.y-P.y)<=1) eat(P,AI);
}

// ── 拾取 ──
function pickP(){
  for(let i=items.length-1;i>=0;i--){
    let it=items[i];
    if(it.x===P.x&&it.y===P.y&&it.t!=='bush'&&it.t!=='tree'){
      let s=ITEMS[it.t].s;
      P.score=Math.max(0,P.score+s);
      if(s>0){float('+'+s,P.x,P.y,'#ffff00');P.seg.push({...P.seg[P.seg.length-1]});}
      else{float(''+s,P.x,P.y,'#ff4444');if(P.seg.length>1)P.seg.pop();}
      items.splice(i,1);
      let t=it.t; setTimeout(()=>{let p=safePos();items.push({t,x:p.x,y:p.y,hp:0,maxhp:0});},4000);
      updScore();
    }
  }
}
function pickAI(){
  for(let i=items.length-1;i>=0;i--){
    let it=items[i];
    if(it.x===AI.x&&it.y===AI.y){
      if(it.t!=='bush'&&it.t!=='tree'){
        let s=ITEMS[it.t].s; AI.score=Math.max(0,AI.score+s);
        if(s>0)AI.seg.push({...AI.seg[AI.seg.length-1]}); else if(AI.seg.length>1)AI.seg.pop();
        items.splice(i,1);
        let t=it.t; setTimeout(()=>{let p=safePos();items.push({t,x:p.x,y:p.y,hp:0,maxhp:0});},4000);
        updScore();
      } else {
        it.hp--; if(it.hp<=0){
          AI.score+=ITEMS[it.t].rwd*2; items.splice(i,1);
          let t=it.t; setTimeout(()=>{let p=safePos();items.push({t,x:p.x,y:p.y,hp:ITEMS[t].hp,maxhp:ITEMS[t].hp});},5000);
          updScore();
        }
      }
    }
  }
}

// ── PVP ──
function pvp(){
  if(P.inv>0)return;
  if(P.x===AI.x&&P.y===AI.y){ P.score>=AI.score?eat(P,AI):eat(AI,P); }
}
function eat(winner,loser){
  let stolen=loser.score; winner.score+=stolen; loser.score=0;
  for(let i=0;i<3;i++) winner.seg.push({...winner.seg[winner.seg.length-1]});
  if(loser===P){
    let sp=safePos(); P.x=sp.x; P.y=sp.y;
    P.seg=[{x:sp.x,y:sp.y},{x:clamp(sp.x-1,0,COLS()-1),y:sp.y}];
    P.inv=180; float('😵-'+stolen,P.x,P.y,'#ff4444');
    setTimeout(showAd,1200);
  } else {
    let sp=safePos(); AI.x=sp.x; AI.y=sp.y;
    AI.seg=[{x:sp.x,y:sp.y},{x:clamp(sp.x+1,0,COLS()-1),y:sp.y}];
    float('+'+stolen+'💰',P.x,P.y,'#00ff00');
    levelWins++;
    if(levelWins>=1){ levelWins=0; level++; AI.interval=aiInterval(level); showLvUp(); }
    updLevel();
    setTimeout(showAd,1200);
  }
  updScore();
}

// ── AI ──
function aiThink(){
  AI.timer++;
  if(AI.timer<AI.interval)return;
  AI.timer=0;
  let best=null, bd=999;
  if(AI.score-P.score>3||P.score-AI.score>5){ best={x:P.x,y:P.y}; bd=0; }
  else {
    for(let it of items){
      if(it.t==='poison')continue;
      let d=Math.abs(it.x-AI.x)+Math.abs(it.y-AI.y);
      if(d<bd){bd=d;best=it;}
    }
  }
  if(!best)return;
  let dx=best.x-AI.x, dy=best.y-AI.y;
  let nx=AI.x, ny=AI.y;
  if(Math.abs(dx)>=Math.abs(dy)) nx=clamp(AI.x+Math.sign(dx),0,COLS()-1);
  else ny=clamp(AI.y+Math.sign(dy),0,ROWS()-1);
  AI.seg.unshift({x:nx,y:ny}); AI.seg.pop(); AI.x=nx; AI.y=ny;
  pickAI();
  if(P.inv<=0&&AI.x===P.x&&AI.y===P.y){ AI.score>=P.score?eat(AI,P):eat(P,AI); }
}

// ── 浮动文字 ──
let floats=[];
function float(txt,tx,ty,col){
  floats.push({txt,x:tx*TILE+TILE/2,y:ty*TILE+TILE/2,col,life:60,vy:-1.5});
}

// ── 关卡升级 ──
let lvUpTxt='', lvUpTimer=0;
function showLvUp(){ lvUpTxt='🎉 关卡'+level+'！AI加速！'; lvUpTimer=90; }

// ── 更新UI ──
function updScore(){
  document.getElementById('ps').textContent=P?P.score:0;
  document.getElementById('as').textContent=AI?AI.score:0;
  let ic='⚔️';
  if(P&&AI){ if(P.score>AI.score+10)ic='🏆'; else if(AI.score>P.score+10)ic='😬'; }
  document.getElementById('status').textContent=ic;
}
function updLevel(){ document.getElementById('lvl').textContent='关卡 '+level; }

// ── 主循环 ──
function loop(){
  if(!running){requestAnimationFrame(loop);return;}
  frame++;
  if(P.atkCD>0)P.atkCD--;
  if(P.inv>0)P.inv--;
  if(lvUpTimer>0)lvUpTimer--;
  aiThink();
  floats=floats.filter(f=>f.life>0);
  floats.forEach(f=>{f.y+=f.vy;f.life--;});
  draw();
  requestAnimationFrame(loop);
}

// ── 绘制 ──
function draw(){
  ctx.fillStyle='#16213e'; ctx.fillRect(0,0,cv.width,cv.height);
  // 网格
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=0.5;
  for(let c=0;c<=COLS();c++){ctx.beginPath();ctx.moveTo(c*TILE,0);ctx.lineTo(c*TILE,cv.height);ctx.stroke();}
  for(let r=0;r<=ROWS();r++){ctx.beginPath();ctx.moveTo(0,r*TILE);ctx.lineTo(cv.width,r*TILE);ctx.stroke();}
  // 物品
  for(let it of items){
    let d=ITEMS[it.t];
    ctx.font=(TILE-6)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(d.e, it.x*TILE+TILE/2, it.y*TILE+TILE/2);
    if(it.maxhp>0){
      let bx=it.x*TILE+2,by=it.y*TILE+TILE-5,bw=TILE-4,bh=3;
      ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#2ecc71';ctx.fillRect(bx,by,bw*(it.hp/it.maxhp),bh);
    }
  }
  drawC(P); drawC(AI);
  // 无敌光环
  if(P.inv>0){
    let alpha=0.3+0.4*Math.sin(frame*0.3);
    ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle='#aaddff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(P.x*TILE+TILE/2,P.y*TILE+TILE/2,TILE*0.9,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  // 关卡升级提示
  if(lvUpTimer>0){
    ctx.save(); ctx.globalAlpha=Math.min(1,lvUpTimer/30);
    ctx.fillStyle='#FFE600'; ctx.font='bold 20px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(lvUpTxt,cv.width/2,cv.height/2-20);
    ctx.restore();
  }
  // 浮动文字
  for(let f of floats){
    ctx.save(); ctx.globalAlpha=f.life/60;
    ctx.fillStyle=f.col; ctx.font='bold 13px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.txt,f.x,f.y); ctx.restore();
  }
}

function drawC(c){
  let def=ROLES[c.role];
  for(let i=c.seg.length-1;i>=1;i--){
    let s=c.seg[i];
    ctx.fillStyle=def.color+'88';
    ctx.beginPath(); ctx.roundRect(s.x*TILE+2,s.y*TILE+2,TILE-4,TILE-4,6); ctx.fill();
  }
  let h=c.seg[0], hx=h.x*TILE+TILE/2, hy=h.y*TILE+TILE/2;
  if(c===P){
    let g=ctx.createRadialGradient(hx,hy,2,hx,hy,TILE*0.7);
    g.addColorStop(0,'rgba(255,230,0,0.85)'); g.addColorStop(1,'rgba(255,230,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(hx,hy,TILE*0.7,0,Math.PI*2); ctx.fill();
  }
  ctx.font=(TILE-4)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(def.emoji,hx,hy);
  if(c===P&&P.atkCD>15){
    ctx.fillStyle='rgba(255,200,0,0.45)';
    ctx.beginPath(); ctx.arc(hx,hy,TILE*0.8,0,Math.PI*2); ctx.fill();
  }
}

// ── 广告/抽奖 ──
function showAd(){
  if(!running)return;
  running=false; show('m-ad');
  let sec=10;
  document.getElementById('ad-sec').textContent=sec;
  let btn=document.getElementById('ad-btn');
  btn.style.opacity='0.4'; btn.style.pointerEvents='none';
  let t=setInterval(()=>{
    sec--;
    document.getElementById('ad-sec').textContent=sec;
    if(sec<=0){
      clearInterval(t); btn.style.opacity='1'; btn.style.pointerEvents='auto';
      document.getElementById('ad-txt').textContent='✅ 广告看完，点击复活！';
    }
  },1000);
}

// ad 按钮单独绑定（避免 opacity 状态问题）
document.getElementById('ad-btn').addEventListener('touchstart',function(e){
  if(this.style.pointerEvents==='none')return;
  e.preventDefault(); closeAd();
},{passive:false});
document.getElementById('ad-btn').addEventListener('click',function(){
  if(this.style.pointerEvents==='none')return;
  closeAd();
});

function closeAd(){
  hide('m-ad');
  running=true; P.inv=180;
  document.getElementById('ad-txt').textContent='请等待 <span id="ad-sec">10</span> 秒';
  const prizes=[
    {ico:'🦕',txt:'解锁亮黄恐龙！\n下局使用！',unlock:true},
    {ico:'🫐×10',txt:'蓝莓加成！\n得分+20！',score:20},
    {ico:'⚡',txt:'攻击冷却清零！',atk:true},
    {ico:'💰',txt:'安慰奖+5分！',score:5},
  ];
  let p=prizes[Math.floor(Math.random()*prizes.length)];
  document.getElementById('prize-ico').textContent=p.ico;
  document.getElementById('prize-txt').textContent=p.txt;
  if(p.unlock)playerUnlocked=true;
  if(p.score){P.score+=p.score;updScore();}
  if(p.atk)P.atkCD=0;
  show('m-prize');
}
function closePrize(){ hide('m-prize'); }

function show(id){ document.getElementById(id).style.display='flex'; }
function hide(id){ document.getElementById(id).style.display='none'; }

// 启动循环（canvas一直在刷新背景，等待点击）
requestAnimationFrame(loop);
</script>
</body>
